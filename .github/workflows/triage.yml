name: Pipeline Triage Agent

on:
  repository_dispatch:
    types: [pipeline-failure]
  workflow_dispatch:
    inputs:
      log:
        description: "Failure log content"
        required: true
      category:
        description: "Failure category (playwright-e2e or eks-deploy)"
        default: "eks-deploy"
      job:
        description: "Job name"
        default: "manual-trigger"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    name: Analyze failure and notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Select PAT (rotate across team members by day of month)
        id: select-pat
        env:
          PAT_TOKEN_1: ${{ secrets.PAT_TOKEN_1 }}
          PAT_TOKEN_2: ${{ secrets.PAT_TOKEN_2 }}
          PAT_TOKEN_3: ${{ secrets.PAT_TOKEN_3 }}
        run: |
          PATS=("$PAT_TOKEN_1" "$PAT_TOKEN_2" "$PAT_TOKEN_3")
          IDX=$(( ($(date +%-d) - 1) % 3 ))
          echo "Rotating: using PAT index $((IDX + 1)) (day $(date +%-d))"
          echo "selected_pat=${PATS[$IDX]}" >> $GITHUB_OUTPUT

      - name: Install GitHub Copilot CLI extension
        env:
          GITHUB_TOKEN: ${{ steps.select-pat.outputs.selected_pat }}
        run: gh extension install github/gh-copilot

      - name: Run triage agent
        env:
          GITHUB_TOKEN:      ${{ steps.select-pat.outputs.selected_pat }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          ACTIONS_RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_PAYLOAD: >-
            ${{
              github.event_name == 'workflow_dispatch'
              && format('{{"log":"{0}","category":"{1}","job":"{2}","branch":"{3}","commit":"{4}"}}',
                  github.event.inputs.log,
                  github.event.inputs.category,
                  github.event.inputs.job,
                  github.ref_name,
                  github.sha)
              || toJson(github.event.client_payload)
            }}
        run: python triage_agent.py
