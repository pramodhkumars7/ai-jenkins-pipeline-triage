name: Pipeline Triage Agent

on:
  repository_dispatch:
    types: [local-test-failure]

permissions:
  contents: read
  models: read

jobs:
  triage:
    name: Analyze failure and notify
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout so triage_agent.py is available ──────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Step 2: Install Python deps ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      # ── Step 3: Run triage agent ───────────────────────────────────────────
      # GITHUB_TOKEN  → GitHub Models (auto-injected, no setup needed)
      # PAT_TOKEN     → Gist fetch + delete  (add in repo Settings → Secrets)
      # EVENT_PAYLOAD → metadata + gist_id sent from local machine
      - name: Run triage agent
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          PAT_TOKEN:     ${{ secrets.PAT_TOKEN }}
          EVENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python triage_agent.py
