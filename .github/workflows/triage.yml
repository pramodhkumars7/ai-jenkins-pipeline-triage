name: Pipeline Triage Agent

on:
  repository_dispatch:
    types: [local-test-failure]

permissions:
  contents: read

jobs:
  triage:
    name: Analyze failure and notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── STEP 1: Print payload — verify logs are arriving ───────────────────
      - name: Print received payload
        env:
          EVENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 - <<'EOF'
          import os, json

          p = json.loads(os.environ["EVENT_PAYLOAD"])

          print("=" * 60)
          print("  Payload received from local machine")
          print("=" * 60)
          print(f"  Job     : {p.get('job', 'N/A')}")
          print(f"  Machine : {p.get('machine', 'N/A')}")
          print(f"  Branch  : {p.get('branch', 'N/A')}")
          print(f"  Commit  : {p.get('commit', 'N/A')}")
          print()
          print("--- LOG SNIPPET (first 50 lines) ---")
          log = p.get("log", "(empty)")
          for line in log.splitlines()[:50]:
              print(line)
          print("=" * 60)
          EOF

