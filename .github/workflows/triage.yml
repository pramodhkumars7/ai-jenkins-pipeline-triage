name: Pipeline Triage Agent

on:
  repository_dispatch:
    types: [local-test-failure]

permissions:
  contents: read

jobs:
  triage:
    name: Analyze failure and notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── STEP 1: Just print the payload — verify logs are arriving ──────────
      - name: Print received payload
        run: |
          echo "==============================="
          echo " Payload received from local machine"
          echo "==============================="
          echo "Job     : ${{ github.event.client_payload.job }}"
          echo "Machine : ${{ github.event.client_payload.machine }}"
          echo "Branch  : ${{ github.event.client_payload.branch }}"
          echo "Commit  : ${{ github.event.client_payload.commit }}"
          echo ""
          echo "--- LOG SNIPPET ---"
          echo '${{ github.event.client_payload.log }}' | head -50
          echo "==============================="

